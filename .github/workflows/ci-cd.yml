name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run tests with coverage
        run: uv run --group dev pytest --cov=src --cov-report=term-missing

  build-and-deploy:
    name: Build Docker and deploy to Hugging Face
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - name: Build Docker image
        run: docker build -t pret-a-depenser-api .

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python -c "
          from huggingface_hub import HfApi
          api = HfApi(token='${{ secrets.HF_TOKEN }}')
          api.upload_folder(
              folder_path='.',
              repo_id='JonathanFernandez/pret_a_depenser',
              repo_type='space',
              ignore_patterns=['.git*', 'tests/*', 'notebooks/*', '.github/*', '__pycache__/*', '*.pyc', '.venv/*', 'docs/*']
          )
          "