name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run tests with coverage
        run: uv run --group dev pytest --cov=src --cov-report=term-missing

  build-and-deploy:
    name: Build Docker and deploy to Hugging Face
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to Docker Hub (optionnel, pour le build)
        run: echo "Build local uniquement, pas de push Docker Hub"

      - name: Build Docker image
        run: docker build -t pret-a-depenser-api .

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          git remote add hf https://JonathanFernandez:$HF_TOKEN@huggingface.co/spaces/JonathanFernandez/pret_a_depenser
          git push hf main --force